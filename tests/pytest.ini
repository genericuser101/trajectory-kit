[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Make assertion rewrites show full diffs for the cross-consistency matrix
addopts =
    --strict-markers
    -p no:cacheprovider
# Silence the ImportPathMismatchWarning when pytest discovers tests
# from multiple roots during development.
filterwarnings =
    ignore::pytest.PytestCollectionWarning
